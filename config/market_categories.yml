# Real Polymarket Gamma tag IDs (confirmed against Polymarket's own
# open-source frontend code) - fast, verified static path.
tag_ids:
  politics: 2
  crypto: 21
  geopolitics: 100265
  finance: 120
  sports: 100639
  tech: 1401
  culture: 596

# Categories beyond the verified static set above - resolved dynamically at
# startup via the real Gamma /tags endpoint (ingestion/category_resolver.py),
# not hardcoded, since these numeric IDs aren't independently confirmed.
# Any that can't be found are skipped with a warning rather than guessed.
#
# Note on "Perps": Polymarket doesn't offer true perpetual futures (that's
# a different product - dYdX/GMX/Hyperliquid). The closest analog is
# short-horizon crypto up/down markets, already covered under "crypto"
# above - there's no separate perps tag to add.
dynamic_categories:
  - iran
  - middle_east
  - weather
  - elections
  - breaking_news
  - economy

categories_to_scan:
  - politics
  - crypto
  - sports
  - geopolitics
  - finance
  - tech
  - culture
  - iran
  - middle_east
  - weather
