min_primary_sources: 1
min_secondary_sources: 1
max_news_age_hours: 48
min_confidence_to_alert: 0.6
max_confidence_free_tier: 0.5   # confidence ceiling when only free-tier checks ran
min_edge_for_paid_verification: 0.08
require_liquidity_check: true
llm_model: "claude-sonnet-4-6"
llm_max_searches_per_check: 4   # web_search tool call budget per evidence check
verification_cache_hours: 24    # don't re-verify (re-charge) the same market within this window
min_similar_events_before_llm: 2   # historical_context free-tier match count needed to skip paid tier
google_alerts_rss_urls: []   # paste your own Google Alerts RSS URLs here (google.com/alerts -> "RSS feed" delivery)
                              # these are personal/private URLs Google generates per alert - can't be hardcoded
