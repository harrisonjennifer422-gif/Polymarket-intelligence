min_sample_size: 3
min_pnl_horizon_days: 30
max_acceptable_drawdown_usd: 5000
weights:
  win_rate: 0.35
  sample_confidence: 0.20
  breadth: 0.15
  drawdown: 0.15
  category_consistency: 0.15
luck_penalty:
  penalty_small_sample: 0.4
  penalty_concentration: 0.3
  penalty_drawdown: 0.2
  max_concentration_share: 0.6
copy_trade_score_threshold: 55   # 0-100, min score for "copy" recommendation
leaderboard_pool_size: 100
max_trade_count_for_selectivity: 150
min_wallet_age_days: 90
min_pnl_usd: 2000
taxonomy:
  emotional_max_win_rate: 0.40         # win rate at/below this + high frequency -> emotional_trader
  high_frequency_min_trades_per_day: 3.0
  whale_min_avg_notional_usd: 10000
  smart_money_min_win_rate: 0.60
  smart_money_min_breadth: 3
  specialist_max_breadth: 2
activity_recency:
  # A wallet can have a great historical record and still be a bad
  # copy-trade candidate right now if it's gone dormant. These thresholds
  # downgrade the recommendation regardless of score - past skill isn't
  # proof the wallet is still actively finding edge.
  max_days_dormant_for_copy: 14    # >14 days since last trade -> never "copy", capped at "watch"
  max_days_dormant_for_watch: 45   # >45 days since last trade -> downgraded to "avoid" (likely inactive/abandoned wallet)
